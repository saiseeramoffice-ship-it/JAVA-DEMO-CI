name: java-ci-cd

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
      - uses: actions/checkout@v4

      - name: Verify checkout
        run: |
          pwd
          ls -ltr

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3.0.0
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Java Setup
        run: java -version

      - name: verify maven setup
        run: mvn -version

      - name: Download Dependencies
        run: mvn dependency:resolve

      # - name: Run OWSA Dependency Check
      #   run: mvn org.owasp:dependency-check-maven:check

      # - name: Upload OWSA Report
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: owasp-report
      #     path: target/dependency-check-report.html
#=============================================
# JOB-2 BUILD TEST COVERAGE
#=============================================
build-test-coverage:
  needs: validation-and-security
  runs-on: ubuntu-latest
  steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile
        run: mvn compile

      - name: Unit Test
        run: mvn test

      - name: Generate Test Coverage Report
        run: mvn jacoco:report

      - name: Upload Test Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

#=============================================
# JOB-3 SAST
#=============================================
sast-analysis:
  needs: build-test-coverage
  runs-on: ubuntu-latest
  steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1.0.0


#=============================================
# JOB-4 PACKAGE
#=============================================
package-artifact:
  needs: sast-analysis
  runs-on: ubuntu-latest
  steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Jar
        run: mvn clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: login-logout-jar
          path: target/*.jar

#=============================================
# JOB-5 CONTAINER
#=============================================

container-security:
  needs: package-artifact
  runs-on: ubuntu-latest
  steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: login-logout-jar

      - name: verify artifact
        run: ls -ltr

      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name : Build Docker Image
        run: |
          docker build \
          - t ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.run_number }}

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.run_number }}
        
      - name: install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.run_number }} -o spdx-json > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.run_number }}